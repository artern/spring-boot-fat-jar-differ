name: Release To Maven Central

on:
  workflow_dispatch:
    inputs:
      publish_mode:
        description: Publish mode
        required: true
        default: close-only
        type: choice
        options:
          - close-only
          - close-and-release
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: maven-central-release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ORG_GRADLE_PROJECT_sonatypeUsername: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
      ORG_GRADLE_PROJECT_sonatypePassword: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
      ORG_GRADLE_PROJECT_signingKey: ${{ secrets.GPG_PRIVATE_KEY }}
      ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.GPG_PASSPHRASE }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Validate release metadata
        shell: bash
        run: |
          set -euo pipefail
          version=$(sed -n "s/^version = '\([^']*\)'$/\1/p" build.gradle | head -n1)
          if [[ -z "$version" ]]; then
            echo "Unable to determine project version from build.gradle" >&2
            exit 1
          fi
          if [[ "$version" == *-SNAPSHOT ]]; then
            echo "Refusing to publish SNAPSHOT version: $version" >&2
            exit 1
          fi
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            expected_tag="v${version}"
            if [[ "${GITHUB_REF_NAME}" != "$expected_tag" ]]; then
              echo "Tag ${GITHUB_REF_NAME} does not match project version ${version}. Expected ${expected_tag}." >&2
              exit 1
            fi
          fi

      - name: Build project
        run: ./gradlew clean build --no-daemon

      - name: Publish and close staging repository
        if: github.event_name == 'workflow_dispatch' && inputs.publish_mode == 'close-only'
        run: ./gradlew stageToolingToCentral --no-daemon

      - name: Publish and release to Maven Central
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish_mode == 'close-and-release')
        run: ./gradlew releaseToolingToCentral --no-daemon
